services:
  postgres:
    image: postgres:16-alpine
    container_name: stocks-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stocks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stocks_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-stocks}
    volumes:
      - stocks_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  stocks_pg_data:
